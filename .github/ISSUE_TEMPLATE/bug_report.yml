name: Bug report
description: Something in the add-on is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. **Do not report security vulnerabilities here** —
        use [private reporting](https://github.com/unsnow-iac/claude-code-ha/security/advisories/new)
        instead (see `SECURITY.md`).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install/update the add-on to version …
        2. Open the panel and …
        3. See …
    validations:
      required: true
  - type: input
    id: addon-version
    attributes:
      label: Add-on version
      description: From the add-on info page (e.g. 4.7.0).
    validations:
      required: true
  - type: input
    id: ha-arch
    attributes:
      label: Architecture
      description: amd64 or aarch64 (from System → Hardware).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant add-on log output
      description: Copy the add-on's log around the failure. Redact any tokens/secrets.
      render: shell
  - type: textarea
    id: config
    attributes:
      label: Add-on configuration
      description: Your add-on options, with any secrets (e.g. the ha-mcp URL) redacted.
      render: yaml
