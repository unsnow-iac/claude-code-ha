name: CI

# Runs on every pull request and on pushes to main. The goal is to catch the
# kind of breakage this fork exists to prevent — a Dockerfile that no longer
# builds, a malformed add-on manifest, or a shell script with a syntax error —
# *before* it ships and bricks the add-on on someone's Home Assistant.
#
# The checks are split into independent jobs so they run in parallel and each
# reports on its own — a failure in one doesn't hide the results of the others.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hadolint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Intentional rule exceptions live in .hadolint.yaml at the repo root.
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: claude-terminal/Dockerfile
          config: .hadolint.yaml

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `-s bash` forces bash parsing so the `#!/usr/bin/with-contenv bashio`
      # shebang on the add-on scripts doesn't trip "unsupported shebang".
      # severity:error means only real bugs fail — not the many intentional
      # unquoted expansions in these scripts.
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -s bash
        with:
          severity: error

  addon-lint:
    name: Lint add-on manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Validates config.yaml / build.yaml against Home Assistant's schema —
      # catches a bad version, missing field, or invalid option type that would
      # otherwise only surface in the HA add-on store.
      - name: Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: ./claude-terminal

  version-sync:
    name: Check version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The add-on version in config.yaml and the image label in build.yaml must
      # stay in sync (a repo invariant). Cheap guard against a half-done bump.
      - name: config.yaml version == build.yaml label
        run: |
          cfg=$(grep -oP '^version:\s*"\K[^"]+' claude-terminal/config.yaml)
          lbl=$(grep -oP 'org\.opencontainers\.image\.version:\s*"\K[^"]+' claude-terminal/build.yaml)
          echo "config.yaml version: $cfg"
          echo "build.yaml  label  : $lbl"
          if [ "$cfg" != "$lbl" ]; then
            echo "::error::Version mismatch — bump both config.yaml and build.yaml together."
            exit 1
          fi

  build:
    name: Build image (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build against the real Alpine 3.21 base, exactly as the HA builder would,
      # to prove the image still builds. amd64 only (native, fast, reliable);
      # arm builds would need slow QEMU emulation and can be added later. Note:
      # this catches *build* failures, not runtime ones like the musl `statx`
      # crash, which only appear when the binary launches on a device.
      - name: Build amd64 image
        uses: docker/build-push-action@v6
        with:
          context: ./claude-terminal
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.21
          push: false
          tags: local/claude-terminal:ci
